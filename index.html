const STAGES=['idea','sampling','pitched','in_review','listed','live','dropped'];
const STAGE_LABEL={idea:'Idea',sampling:'Sampling',pitched:'Pitched',in_review:'In review',listed:'Listed',live:'Live',dropped:'Dropped'};
const FORMATS=['frozen','chilled','ambient','dry']; const DATA=['confirmed','partial','unknown'];
const BRANDS=['Own brand','Manufacturer brand','Retailer private label'];
const PROD_KEYS=['pack_size_g','units_per_case','cases_per_pallet','cost_value','hs_code','meat_pct','shelf_life_months'];
function readiness(p){ const filled=PROD_KEYS.filter(k=>p[k]!=null && p[k]!=='').length; return Math.round(filled/PROD_KEYS.length*100); }

function Badge({value}){ const map={confirmed:'bg-emerald-100 text-emerald-700',partial:'bg-amber-100 text-amber-700',unknown:'bg-rose-100 text-rose-600'};
  return <span className={'px-2 py-0.5 rounded-full text-xs font-medium '+(map[value]||'bg-slate-100 text-slate-500')}>{value||'-'}</span>; }
function StageTag({s}){ const map={idea:'bg-slate-100 text-slate-600',sampling:'bg-sky-100 text-sky-700',pitched:'bg-indigo-100 text-indigo-700',in_review:'bg-violet-100 text-violet-700',listed:'bg-emerald-100 text-emerald-700',live:'bg-emerald-100 text-emerald-700',dropped:'bg-rose-100 text-rose-600'};
  return <span className={'px-2 py-0.5 rounded text-xs font-medium '+(map[s]||'bg-slate-100')}>{STAGE_LABEL[s]||s}</span>; }
function BrandTag({b}){ const map={'Own brand':'bg-emerald-100 text-emerald-700','Manufacturer brand':'bg-sky-100 text-sky-700','Retailer private label':'bg-violet-100 text-violet-700'}; return <span className={'px-2 py-0.5 rounded text-xs font-medium '+(map[b]||'bg-slate-100 text-slate-500')}>{b}</span>; }
function Pri({p}){ const c=p==='P1'?'text-rose-600':p==='P2'?'text-amber-600':'text-slate-400'; return <span className={'text-xs font-bold '+c}>{p}</span>; }

/* ---------------- form ---------------- */
function Field({def,value,onChange,opts}){
  const cls="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500";
  if(def.type==='select') return <select className={cls} value={value||''} onChange={e=>onChange(e.target.value)}><option value="">-</option>{(def.options||opts||[]).map(o=>typeof o==='object'?<option key={o.value} value={o.value}>{o.label}</option>:<option key={o} value={o}>{o}</option>)}</select>;
  if(def.type==='bool') return <label className="inline-flex items-center gap-2 text-sm"><input type="checkbox" checked={!!value} onChange={e=>onChange(e.target.checked)} className="h-4 w-4 accent-emerald-600"/> yes</label>;
  if(def.type==='textarea') return <textarea className={cls} rows="3" value={value||''} onChange={e=>onChange(e.target.value)} />;
  if(def.type==='number') return <input type="number" step="any" className={cls} value={value??''} onChange={e=>onChange(e.target.value===''?null:Number(e.target.value))} />;
  return <input type="text" className={cls} value={value||''} onChange={e=>onChange(e.target.value)} />;
}
function EntityForm({fields,record,lookups,onSave,onClose}){
  const [d,setD]=useState(record||{}); const set=(k,v)=>setD(p=>({...p,[k]:v}));
  const fieldOpts=(f)=>{ let o=f.lookup?lookups[f.lookup]:null; if(f.filterBy && d[f.filterBy] && o) o=o.filter(x=>x.manufacturer_id===d[f.filterBy]); return o; };
  return (<div>
    <div className="grid sm:grid-cols-2 gap-x-4 gap-y-3 max-h-[62vh] overflow-auto pr-1">
      {fields.map(f=>(<div key={f.key} className={f.type==='textarea'?'sm:col-span-2':''}>
        <label className="block text-xs font-medium text-slate-500 mb-1">{f.label}</label>
        <Field def={f} value={d[f.key]} opts={fieldOpts(f)} onChange={v=>{ set(f.key,v); if(f.clears) f.clears.forEach(k=>set(k,null)); }}/>
      </div>))}
    </div>
    <div className="flex justify-end gap-2 mt-5">
      <button onClick={onClose} className="px-4 py-2 text-sm rounded-lg border border-slate-300 text-slate-600 hover:bg-slate-50">Cancel</button>
      <button onClick={()=>onSave(d)} className="px-5 py-2 text-sm rounded-lg bg-emerald-600 hover:bg-emerald-700 btn-em text-white font-medium">Save</button>
    </div>
  </div>);
}

  function LandedCalc({p}){

            {DCOLL[drawer.type] && <button onClick={()=>{if(confirm('Delete this record?')){remove(DCOLL[drawer.type],drawer.id);setDrawer(null);}}} className="text-slate-400 hover:text-rose-500 p-1" title="Delete"><Icon d={Ic.trash} className="w-4 h-4"/></button>}

          </div>

        <div className="p-6">{body}</div>

    </div>);
  };

  const productRows = data.products.map(r=>({...r,__drawer:{type:'product',id:r.id}}));

  const retRows = data.retailers.map(r=>({...r,__drawer:{type:'retailer',id:r.id}}));
  const RelMap=()=>{
    const mans=data.manufacturers, rets=data.retailers;
    const prodMan={}; data.products.forEach(p=>{prodMan[p.id]=p.manufacturer_id;});
    const model=(m)=>{const n=((m&&m.name)||'').toLowerCase(); if(n.includes('aldelis')||n.includes('pekish')||n.includes('avis')) return {label:'Commission 3-5%',color:'#059669'}; if(n.includes('minhe')) return {label:'Buy & resell ~35%',color:'#4f46e5'}; if(n.includes('korean')) return {label:'NPD, tariff TBC',color:'#d97706'}; return {label:((m&&m.status)||'Concept'),color:'#64748b'};};
    const skuCount=(mid)=>data.products.filter(p=>p.manufacturer_id===mid).length;
    const dealCount=(mid)=>data.opportunities.filter(o=>prodMan[o.product_id]===mid).length;

    const NH=58,GAP=18,padTop=26,W=920,nodeW=220,leftX=16,rightX=W-nodeW-16;

  const Forecast=()=>{
    const PROB={idea:0.1,sampling:0.25,pitched:0.4,in_review:0.6,listed:0.8,live:1,dropped:0};

    const isComm=(mid)=>{const m=byId('manufacturers',mid); const n=((m&&m.name)||'').toLowerCase(); return n.includes('aldelis')||n.includes('pekish')||n.includes('avis');};
    const rows=data.opportunities.filter(o=>o.stage!=='dropped').map(o=>{const p=byId('products',o.product_id); const mid=p&&p.manufacturer_id; const val=Number(o.value_estimate)||0; const prob=PROB[o.stage]!=null?PROB[o.stage]:0; const comm=(p&&p.brand!=='Own brand')&&isComm(mid); return {o,mid,comm,val,prob,wval:val*prob};});
    const totVal=rows.reduce((s,r)=>s+r.val,0);

    const resaleBase=rows.filter(r=>!r.comm).reduce((s,r)=>s+r.wval,0);
    const resaleMargin=resaleBase*mpct;
    const commAt=(r)=>commBase*r;
    const incomeAt=(r)=>resaleMargin+commBase*r;
    const missing=rows.filter(r=>r.val===0).length;
    const byMfr={}; rows.forEach(r=>{const k=r.mid||'?'; byMfr[k]=byMfr[k]||{val:0,wval:0,comm:r.comm,n:0}; byMfr[k].val+=r.val; byMfr[k].wval+=r.wval; byMfr[k].n++;});
    const byStage=STAGES.filter(s=>s!=='dropped').map(s=>{const rs=rows.filter(r=>r.o.stage===s); return {s,n:rs.length,val:rs.reduce((a,b)=>a+b.val,0),prob:PROB[s],wval:rs.reduce((a,b)=>a+b.wval,0)};});
    const card=(label,value,sub)=>(<div className="bg-white rounded-2xl border border-slate-200/70 card-elev p-4"><div className="text-xs text-slate-400">{label}</div><div className="text-2xl font-bold text-slate-800 mt-1 tnum">{value}</div>{sub&&<div className="text-xs text-slate-400 mt-1">{sub}</div>}</div>);
    return(<div className="p-6 space-y-6">
      <div className="flex items-center gap-3 flex-wrap bg-white rounded-xl border border-slate-200 p-3">
        <div className="text-xs font-medium text-slate-600">Resale gross margin (Minhe + own brand)</div>
        <input type="number" value={margin} onChange={e=>setMargin(e.target.value)} className="w-20 border border-slate-300 rounded-lg px-2 py-1 text-sm"/><span className="text-xs text-slate-400">%</span>
        <div className="text-xs text-slate-400 ml-auto">Stage weights: idea 10% · sampling 25% · pitched 40% · in review 60% · listed 80% · live 100%</div>
      </div>
      <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-4">
        {card('Pipeline sell-in (full)',money(totVal),'unweighted, £/yr')}
        {card('Weighted sell-in',money(wVal),'probability-weighted, £/yr')}
        {card('Weighted resale margin',money(resaleMargin),margin+'% on weighted resale')}
        {card('Weighted Aldelis commission',money(commAt(0.03))+' / '+money(commAt(0.04))+' / '+money(commAt(0.05)),'at 3% / 4% / 5%')}
      </div>
      <div className="bg-emerald-50 border border-emerald-100 rounded-2xl p-4"><div className="text-xs text-emerald-700 font-semibold mb-1">Weighted income to us (Minhe margin + Aldelis commission)</div><div className="text-xl font-bold text-emerald-800">{money(incomeAt(0.03))} – {money(incomeAt(0.05))} <span className="text-sm font-normal text-emerald-600">/yr (Aldelis 3% to 5%)</span></div></div>
      {missing>0 && <div className="text-xs text-amber-600">{missing} of {rows.length} opportunities have no annual value yet. Add "Value est (£/yr)" on a pipeline card to include it.</div>}
      <div className="grid lg:grid-cols-2 gap-6">
        <div className="bg-white rounded-2xl border border-slate-200/70 card-elev overflow-hidden"><div className="px-4 py-3 text-sm font-semibold text-slate-700 border-b border-slate-100">By stage</div><table className="w-full text-sm"><thead className="text-xs text-slate-400"><tr><th className="text-left px-4 py-2">Stage</th><th className="text-right px-4 py-2">#</th><th className="text-right px-4 py-2">Sell-in</th><th className="text-right px-4 py-2">Wt</th><th className="text-right px-4 py-2">Weighted</th></tr></thead><tbody>{byStage.map(r=>(<tr key={r.s} className="border-t border-slate-100"><td className="px-4 py-2"><StageTag s={r.s}/></td><td className="px-4 py-2 text-right text-slate-500">{r.n}</td><td className="px-4 py-2 text-right">{money(r.val)}</td><td className="px-4 py-2 text-right text-slate-400">{Math.round(r.prob*100)}%</td><td className="px-4 py-2 text-right font-medium">{money(r.wval)}</td></tr>))}</tbody></table></div>
        <div className="bg-white rounded-2xl border border-slate-200/70 card-elev overflow-hidden"><div className="px-4 py-3 text-sm font-semibold text-slate-700 border-b border-slate-100">By manufacturer</div><table className="w-full text-sm"><thead className="text-xs text-slate-400"><tr><th className="text-left px-4 py-2">Manufacturer</th><th className="text-left px-4 py-2">Model</th><th className="text-right px-4 py-2">Weighted sell-in</th><th className="text-right px-4 py-2">Your income</th></tr></thead><tbody>{Object.entries(byMfr).map(([k,v])=>(<tr key={k} className="border-t border-slate-100"><td className="px-4 py-2">{mName(k)}</td><td className="px-4 py-2 text-xs text-slate-500">{v.comm?'Commission':'Resale margin'}</td><td className="px-4 py-2 text-right">{money(v.wval)}</td><td className="px-4 py-2 text-right font-medium">{v.comm?(money(v.wval*0.03)+' – '+money(v.wval*0.05)):money(v.wval*mpct)}</td></tr>))}</tbody></table></div>
      </div>
      <div className="bg-white rounded-2xl border border-slate-200/70 card-elev overflow-hidden"><div className="px-4 py-3 text-sm font-semibold text-slate-700 border-b border-slate-100">By opportunity</div><div className="overflow-x-auto"><table className="w-full text-sm"><thead className="text-xs text-slate-400"><tr><th className="text-left px-4 py-2">Product</th><th className="text-left px-4 py-2">Retailer</th><th className="text-left px-4 py-2">Stage</th><th className="text-right px-4 py-2">Annual value</th><th className="text-right px-4 py-2">Weighted</th><th className="text-right px-4 py-2">Your income</th></tr></thead><tbody>{rows.map(r=>(<tr key={r.o.id} className="border-t border-slate-100 hover:bg-slate-50 cursor-pointer" onClick={()=>setDrawer({type:'opportunity',id:r.o.id})}><td className="px-4 py-2">{pName(r.o.product_id)}</td><td className="px-4 py-2 text-slate-500">{rName(r.o.retailer_id)}</td><td className="px-4 py-2"><StageTag s={r.o.stage}/></td><td className="px-4 py-2 text-right">{money(r.val)}</td><td className="px-4 py-2 text-right">{money(r.wval)}</td><td className="px-4 py-2 text-right font-medium">{r.comm?(money(r.wval*0.03)+' – '+money(r.wval*0.05)):money(r.wval*mpct)}</td></tr>))}{rows.length===0&&<tr><td colSpan="6" className="px-4 py-8 text-center text-slate-400">No opportunities yet.</td></tr>}</tbody></table></div></div>
    </div>);
  };

  const RetailerView=()=>{
    const rs=data.retailers;
    const [ri,setRi]=useState(0);
    if(rs.length===0) return <div className="p-6 text-sm text-slate-400">No retailers yet. Add one on the Retailers tab.</div>;
    const idx=Math.min(ri,rs.length-1); const r=rs[idx];
    const go=(d)=>setRi((idx+d+rs.length)%rs.length);
    const opps=data.opportunities.filter(o=>o.retailer_id===r.id);
    const money=(n)=>(n==null||isNaN(n)||n===0)?'-':'£'+Math.round(n).toLocaleString();
    const totVal=opps.reduce((a,o)=>a+(Number(o.value_estimate)||0),0);
    const live=opps.filter(o=>o.stage==='live').length;
    const prods=new Set(opps.map(o=>o.product_id)).size;
    const stages=STAGES.filter(s=>s!=='dropped');
    return(<div className="p-6 space-y-6">
      <div className="flex items-center gap-3">
        <button onClick={()=>go(-1)} title="Previous retailer" className="w-9 h-9 rounded-lg border border-slate-200 bg-white hover:bg-slate-50 flex items-center justify-center text-slate-500"><Icon d={Ic.chev} className="w-4 h-4 rotate-180"/></button>
        <select value={idx} onChange={e=>setRi(Number(e.target.value))} className="flex-1 max-w-xs border border-slate-300 rounded-lg px-3 py-2 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-emerald-500">
          {rs.map((x,i)=><option key={x.id} value={i}>{x.name}</option>)}
        </select>
        <button onClick={()=>go(1)} title="Next retailer" className="w-9 h-9 rounded-lg border border-slate-200 bg-white hover:bg-slate-50 flex items-center justify-center text-slate-500"><Icon d={Ic.chev} className="w-4 h-4"/></button>
        <span className="text-xs text-slate-400 tnum">{idx+1} / {rs.length}</span>
        <button onClick={()=>setModal({entity:'opportunities',record:{stage:'idea',retailer_id:r.id}})} className="ml-auto flex items-center gap-1.5 px-4 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-700 btn-em text-white text-sm font-medium"><Icon d={Ic.plus} className="w-4 h-4"/> Add product</button>
      </div>
      <div className="bg-white rounded-2xl border border-slate-200/70 card-elev p-5">
        <div className="flex items-start justify-between gap-4">
          <div>
            <div className="text-xl font-bold text-slate-900">{r.name}</div>
            <div className="text-sm text-slate-500 mt-0.5">{[r.type,r.region,r.store_count?Number(r.store_count).toLocaleString()+' stores':null,r.status].filter(Boolean).join(' · ')}</div>
          </div>
          <button onClick={()=>setDrawer({type:'retailer',id:r.id})} className="text-xs text-emerald-600 hover:underline whitespace-nowrap flex-shrink-0">Open details</button>
        </div>
        {r.notes&&<div className="text-sm text-slate-600 mt-3">{r.notes}</div>}
      </div>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        {[['Opportunities',opps.length],['Live listings',live],['Pipeline value / yr',money(totVal)],['Products',prods]].map(([l,v])=>(
          <div key={l} className="bg-white rounded-2xl border border-slate-200/70 card-elev p-4"><div className="text-xs uppercase tracking-wide text-slate-400">{l}</div><div className="text-2xl font-bold text-slate-800 mt-1 tnum">{v}</div></div>
        ))}
      </div>
      {opps.length===0 ? <div className="text-sm text-slate-400">No opportunities for {r.name} yet. Use "Add product" to start one.</div> :
       <div className="space-y-5">
        {stages.map(s=>{const list=opps.filter(o=>o.stage===s); if(list.length===0) return null; return(
          <div key={s}>
            <div className="flex items-center gap-2 mb-2"><StageTag s={s}/><span className="text-xs text-slate-400">{list.length}</span></div>
            <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
              {list.map(o=>{const p=byId('products',o.product_id); return(
                <div key={o.id} onClick={()=>setDrawer({type:'opportunity',id:o.id})} className="group bg-white rounded-xl border border-slate-200/70 card-elev p-3 cursor-pointer">
                  <div className="flex items-start justify-between gap-2">
                    <div className="font-medium text-slate-800 text-sm leading-tight">{pName(o.product_id)}</div>
                    <button onClick={(e)=>{e.stopPropagation();setModal({entity:'opportunities',record:o});}} className="text-slate-300 hover:text-emerald-600 opacity-0 group-hover:opacity-100 flex-shrink-0" title="Edit"><Icon d={Ic.edit} className="w-3.5 h-3.5"/></button>
                  </div>
                  <div className="text-xs text-slate-400 mt-0.5">{mName(p.manufacturer_id)}</div>{p.brand&&<div className="mt-1"><BrandTag b={p.brand}/></div>}
                  {o.value_estimate>0&&<div className="text-xs text-slate-500 mt-1 tnum">{money(o.value_estimate)}/yr</div>}
                  {o.next_action&&<div className="text-xs text-emerald-600 mt-1 leading-tight">Next: {o.next_action}</div>}
                </div>);})}
            </div>
          </div>);})}
       </div>}
    </div>);
  };

  if(!authReady) return <div className="min-h-screen flex items-center justify-center text-slate-400">Loading...</div>;
  if(!session) return <LoginScreen/>;

  return(<div className="min-h-screen">
    <Sidebar/>
    <div className="ml-60">
      <Topbar title={tab}/>
      {tab==='dashboard'&&<Dashboard/>}
      {tab==='pipeline'&&<Pipeline/>}
      {tab==='forecast'&&<Forecast/>}
      {tab==='map'&&<RelMap/>}
      {tab==='retailerview'&&<RetailerView/>}
      {tab==='products'&&<TableWrap coll="products" rows={productRows.filter(r=>match(r.name))} cols={[
        {key:'name',label:'Product'},
        {key:'manufacturer_id',label:'Manufacturer',render:r=>mName(r.manufacturer_id)},
        {key:'brand',label:'Brand',render:r=>r.brand?<BrandTag b={r.brand}/>:'-',sortable:false},
        {key:'format',label:'Format'},
        {key:'pack_size_g',label:'Pack g'},
        {key:'cost_value',label:'Cost',render:r=>r.cost_value!=null?(r.cost_value+' '+(r.cost_currency||'')):'-'},
        {key:'tariff_status',label:'Tariff',render:r=><Badge value={r.tariff_status}/>,sortable:false},
        {key:'data_status',label:'Data',render:r=><div className="flex items-center gap-2"><div className="w-12 bg-slate-100 rounded-full h-1.5"><div className="bg-emerald-500 h-1.5 rounded-full" style={{width:readiness(r)+'%'}}></div></div><Badge value={r.data_status}/></div>,sortable:false},
      ]} setModal={setModal} setDrawer={setDrawer} remove={remove} q={q}/>}
      {tab==='manufacturers'&&<TableWrap coll="manufacturers" rows={manRows.filter(r=>match(r.name))} cols={[
        {key:'name',label:'Name'},{key:'country',label:'Country'},{key:'format',label:'Format'},{key:'status',label:'Status'},{key:'gb_approval',label:'GB approval'},{key:'agent',label:'Agent'},
      ]} setModal={setModal} setDrawer={setDrawer} remove={remove} q={q}/>}
      {tab==='retailers'&&<TableWrap coll="retailers" rows={retRows.filter(r=>match(r.name))} cols={[
        {key:'name',label:'Name'},{key:'type',label:'Type'},{key:'region',label:'Region'},{key:'store_count',label:'Stores'},{key:'status',label:'Status'},
      ]} setModal={setModal} setDrawer={setDrawer} remove={remove} q={q}/>}
      {tab==='tasks'&&<TableWrap coll="tasks" rows={data.tasks.filter(r=>match(r.title))} cols={[
        {key:'status',label:'',render:r=><input type="checkbox" checked={r.status==='done'} onChange={e=>{e.stopPropagation();toggleTask(r.id);}} className="h-4 w-4 accent-emerald-600"/>,sortable:false,click:false},
        {key:'priority',label:'Pri',render:r=><Pri p={r.priority}/>},
        {key:'title',label:'Task',render:r=><span className={r.status==='done'?'line-through text-slate-400':''}>{r.title}</span>},
        {key:'owner',label:'Owner'},
        {key:'manufacturer_id',label:'Linked',render:r=>r.manufacturer_id?mName(r.manufacturer_id):(r.product_id?pName(r.product_id):'-'),sortable:false},
      ]} setModal={setModal} setDrawer={setDrawer} remove={remove} q={q}/>}
      {tab==='contacts'&&<TableWrap coll="contacts" rows={data.contacts.filter(r=>match(r.name))} cols={[
        {key:'name',label:'Name'},{key:'role',label:'Role'},{key:'email',label:'Email'},{key:'phone',label:'Phone'},{key:'manufacturer_id',label:'Manufacturer',render:r=>r.manufacturer_id?mName(r.manufacturer_id):(r.retailer_id?rName(r.retailer_id):'-'),sortable:false},
      ]} setModal={setModal} setDrawer={setDrawer} remove={remove} q={q}/>}
      {tab==='documents'&&<div><div className="px-6 pt-6"><input type="file" id="docfile" onChange={onPickFile} className="hidden"/><button onClick={()=>document.getElementById('docfile').click()} className="flex items-center gap-1.5 px-4 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-700 btn-em text-white text-sm font-medium"><Icon d={Ic.plus} className="w-4 h-4"/> Upload file</button><span className="ml-3 text-xs text-slate-400">PDFs, images, spreadsheets. Stored privately, opens via a secure link.</span></div><TableWrap coll="documents" rows={data.documents.filter(r=>match(r.title))} cols={[
        {key:'title',label:'Title',render:r=>r.url?<button onClick={(e)=>{e.stopPropagation();openDoc(r);}} className="text-emerald-600 hover:underline text-left">{r.title}</button>:r.title},
        {key:'type',label:'Type'},{key:'manufacturer_id',label:'Linked',render:r=>r.manufacturer_id?mName(r.manufacturer_id):(r.product_id?pName(r.product_id):'-'),sortable:false},
      ]} setModal={setModal} setDrawer={setDrawer} remove={remove} q={q}/></div>}
    </div>

    {modal&&<Modal title={((modal.record&&modal.record.id)?'Edit ':'New ')+SING[modal.entity]} onClose={()=>setModal(null)}><EntityForm fields={FIELDS[modal.entity]} record={modal.record} lookups={lookups} onSave={rec=>{upsert(modal.entity,rec);setModal(null);}} onClose={()=>setModal(null)}/></Modal>}
    <Drawer/>
  </div>);
}

function TableWrap({coll,rows,cols,setModal,setDrawer,remove,q}){
  const [sort,setSort]=useState(null);
  let r=rows;
  if(sort){ r=[...rows].sort((a,b)=>{const x=a[sort.key],y=b[sort.key]; if(x==null)return 1; if(y==null)return -1; return (x>y?1:-1)*sort.dir;}); }
  return(<div className="p-6"><div className="bg-white rounded-2xl border border-slate-200/70 card-elev overflow-hidden"><div className="overflow-x-auto">
    <table className="w-full text-sm"><thead className="bg-slate-50/80 backdrop-blur text-slate-500 text-[11px] uppercase tracking-wider"><tr>
      {cols.map(c=><th key={c.key} onClick={()=>c.sortable!==false&&setSort(s=>({key:c.key,dir:s&&s.key===c.key?-s.dir:1}))} className={'text-left font-medium px-4 py-3 '+(c.sortable!==false?'cursor-pointer select-none hover:text-slate-600':'')}>{c.label}{sort&&sort.key===c.key?(sort.dir>0?' ↑':' ↓'):''}</th>)}<th className="w-20"></th>
    </tr></thead><tbody>
      {r.length===0&&<tr><td colSpan={cols.length+1} className="px-4 py-10 text-center text-slate-400">No records.</td></tr>}
      {r.map(row=>(<tr key={row.id} className="border-t border-slate-100 hover:bg-slate-50/70">
        {cols.map((c,i)=><td key={c.key} onClick={()=>{if(c.click!==false&&row.__drawer)setDrawer(row.__drawer);}} className={'px-4 py-3 text-slate-600 align-top '+(i===0&&row.__drawer?'cursor-pointer font-medium text-slate-800':'')}>{c.render?c.render(row):(row[c.key]??'-')}</td>)}
        <td className="px-4 py-3 text-right whitespace-nowrap">
          <button onClick={()=>setModal({entity:coll,record:row})} className="text-slate-400 hover:text-emerald-600 mr-2 inline-flex"><Icon d={Ic.edit} className="w-4 h-4"/></button>
          <button onClick={()=>{if(confirm('Delete?'))remove(coll,row.id);}} className="text-slate-300 hover:text-rose-500 inline-flex"><Icon d={Ic.trash} className="w-4 h-4"/></button>
        </td></tr>))}
    </tbody></table></div></div></div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
